name: Deploy via FTP

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Build & FTP Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.4"
          extensions: mbstring, pdo, tokenizer, xml, ctype, json, bcmath, fileinfo, gd
          coverage: none
          tools: composer:v2

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Install Composer dependencies
        run: composer install --no-dev --prefer-dist --optimize-autoloader --no-interaction

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          # Change to ftps / 21|990 if your host requires it
          protocol: ftp
          port: 21
          server-dir: /
          local-dir: ./
          dangerous-clean-slate: false
          exclude: |
            **/.git
            **/.git/**
            **/.github/**
            **/.DS_Store
            **/.env
            **/.env.*
            **/.editorconfig
            **/.gitattributes
            **/.npmrc
            **/.phpunit.result.cache
            **/.phpunit.cache/**
            **/node_modules/**
            **/tests/**
            **/phpunit.xml
            **/README.md
            **/storage/logs/*.log
            **/storage/framework/views/*.php
            **/storage/pail/**
            **/bootstrap/cache/*.php
            **/database/*.sqlite
            **/database/*.sqlite-journal
